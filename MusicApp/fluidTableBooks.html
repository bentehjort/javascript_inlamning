<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./assets/css/fluidTableBooks.css" />
  <title>Book Table</title>
</head>
<body>
    <div class="tableFluid">
        <div class="theadFluid">
            <div class="trFluid">
                <div class="trFluid_Grouping2 num">
                    <div class="trFluid_Grouping1 num">
                        <div class="tdFluent">Book Title</div>
                    </div>
                <div class="trFluid_Grouping2 num">
                    <div class="trFluid_Grouping1 num">
                        <div class="tdFluent">Author</div>
                        <div class="tdFluent">Year</div>
                        <div class="tdFluent">Millions Sold</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="tbodyFluid">
            <div class="trFluid">
                <div class="trFluid_Grouping2 num">
                    <div class="trFluid_Grouping1 num">
                        <div class="tdFluent">A Tale of Two Cities</div>
                    </div>
                    <div class="trFluid_Grouping1 num">
                        <div class="tdFluent">Charles Dickens</div>
                        <div class="tdFluent">1859</div>
                        <div class="tdFluent">200 million</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
